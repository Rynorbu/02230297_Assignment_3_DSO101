name: Build and Deploy to Render

on:
  push:
    branches: ["main"]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE_NAME: todo-app-backend
  FRONTEND_IMAGE_NAME: todo-app-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Backend Deployment
        run: |
          curl --request POST \
            --url ${{ secrets.RENDER_BACKEND_WEBHOOK_URL }} \
            --header 'Content-Type: application/json'
        continue-on-error: true

      - name: Trigger Frontend Deployment
        run: |
          curl --request POST \
            --url ${{ secrets.RENDER_FRONTEND_WEBHOOK_URL }} \
            --header 'Content-Type: application/json'
        continue-on-error: true

      - name: Build and Deploy Complete
        run: echo "Docker images built and pushed successfully!"
