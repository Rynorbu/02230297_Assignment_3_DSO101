name: Build and Deploy to Render

on:
  push:
    branches: ["main"]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE_NAME: taskflow-backend
  FRONTEND_IMAGE_NAME: taskflow-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code from repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and Push Backend Docker Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      # Step 5: Build and Push Frontend Docker Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      # Step 6: Trigger Backend Deployment on Render
      - name: Trigger Backend Deployment on Render
        run: |
          curl --request POST \
            --url ${{ secrets.RENDER_BACKEND_WEBHOOK_URL }} \
            --header 'Content-Type: application/json' \
            --data '{"clearCache": true}'
        if: ${{ secrets.RENDER_BACKEND_WEBHOOK_URL != '' }}

      # Step 7: Trigger Frontend Deployment on Render
      - name: Trigger Frontend Deployment on Render
        run: |
          curl --request POST \
            --url ${{ secrets.RENDER_FRONTEND_WEBHOOK_URL }} \
            --header 'Content-Type: application/json'
        if: ${{ secrets.RENDER_FRONTEND_WEBHOOK_URL != '' }}

      # Step 8: Deployment Success Notification
      - name: Deployment Success
        run: |
          echo "✅ Backend image: ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          echo "✅ Frontend image: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest"
          echo "✅ Images pushed to DockerHub"
          echo "✅ Render deployment triggered"
