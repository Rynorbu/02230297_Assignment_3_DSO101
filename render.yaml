services:
  # PostgreSQL Database
  - type: pserv
    name: todo-postgres
    ipAllowList: []
    plan: free
    region: singapore
    postgresVersion: 15
    initialDbName: todo_db
    user: postgres
    passwordEnvVarName: DATABASE_PASSWORD

  # Backend Service
  - type: web
    name: todo-app-backend
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        value: todo-postgres.render.internal
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: ${DATABASE_PASSWORD}
      - key: DB_NAME
        value: todo_db
      - key: DB_PORT
        value: "5432"
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    depends_on:
      - todo-postgres

  # Frontend Service
  - type: web
    name: todo-app-frontend
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://todo-app-backend.onrender.com
